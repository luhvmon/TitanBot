services:
  - type: worker
    name: titanbot
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: GUILD_ID
        sync: false
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: titanbot-db
          property: connectionString

databases:
  - name: titanbot-db
    plan: free
